name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beersheets-mvp/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: beersheets-mvp/backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Run tests
        run: pytest
