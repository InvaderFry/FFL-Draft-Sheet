services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app     # hot-reload source
      - cache_data:/app/cache      # persist cache between restarts
    environment:
      - CACHE_DIR=/app/cache
      - PYTHONUNBUFFERED=1
    # Dev override: --reload (single-worker) intentionally replaces the
    # production CMD's --workers 2. Do not add --workers here; it is
    # incompatible with --reload and masks multi-worker bugs locally.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    healthcheck:
      # node's built-in fetch keeps the probe image-agnostic (no wget/curl
      # dependency if the base image ever changes).
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # npm install runs before the dev server comes up
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cache_data:
  node_modules:
